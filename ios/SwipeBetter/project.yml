name: SwipeBetter
options:
  bundleIdPrefix: ai.swipebetter
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
fileGroups:
  - Configuration.storekit
schemes:
  SwipeBetter:
    build:
      targets:
        SwipeBetter: all
        SwipeBetterUITests: [test]
    test:
      targets:
        - SwipeBetterUITests
    run:
      config: Debug
      storeKitConfiguration: Configuration.storekit
targets:
  SwipeBetter:
    type: application
    platform: iOS
    sources:
      - path: Shared/Sources
      - path: SwipeBetterApp/Sources
      - path: Shared/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: SwipeBetterApp/Resources/Assets.xcassets
        buildPhase: resources
    resources:
      - path: SwipeBetterApp/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swipebetter.app
        INFOPLIST_FILE: SwipeBetterApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: SwipeBetterApp/SwipeBetter.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: SwipeBetterShare
        embed: true
      - target: SwipeBetterKeyboard
        embed: true
  SwipeBetterShare:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared/Sources
      - path: ShareExtension/Sources
      - path: Shared/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: ai.swipebetter.app.share
        INFOPLIST_FILE: ShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShareExtension/SwipeBetterShare.entitlements
        TARGETED_DEVICE_FAMILY: "1"
  SwipeBetterKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: KeyboardExtension/Sources
      - path: Shared/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: ai.swipebetter.app.keyboard
        INFOPLIST_FILE: KeyboardExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: KeyboardExtension/SwipeBetterKeyboard.entitlements
        TARGETED_DEVICE_FAMILY: "1"
  SwipeBetterUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SwipeBetterUITests/Sources
    dependencies:
      - target: SwipeBetter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.swipebetter.app.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: SwipeBetter
        TARGETED_DEVICE_FAMILY: "1"
