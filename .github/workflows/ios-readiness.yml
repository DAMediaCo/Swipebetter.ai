name: iOS App Store Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - codex/ios-app

jobs:
  ios-readiness:
    name: Readiness Gate
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run iOS readiness checks
        run: scripts/ios-readiness-check.sh

      - name: Run iOS simulator smoke
        timeout-minutes: 15
        env:
          IOS_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}/swipebetter-ios-smoke
        run: npm run smoke:ios-simulator

      - name: Upload iOS simulator smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/swipebetter-ios-smoke
          if-no-files-found: warn
          retention-days: 14
