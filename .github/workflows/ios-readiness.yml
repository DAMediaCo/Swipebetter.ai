name: iOS App Store Readiness

on:
  pull_request:
  push:
    branches:
      - main
      - codex/ios-app

jobs:
  ios-readiness:
    name: Readiness Gate
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run check

      - name: Run Apple IAP unit tests
        run: npm run test:ios-iap

      - name: Run iOS readiness checks
        run: scripts/ios-readiness-check.sh

      - name: Run native iOS UI tests
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        timeout-minutes: 22
        env:
          IOS_TEST_ALLOW_INFRASTRUCTURE_FAILURE: "1"
        run: npm run test:ios-ui

      - name: Run iOS simulator smoke
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        timeout-minutes: 15
        env:
          IOS_SMOKE_ARTIFACT_DIR: ${{ runner.temp }}/swipebetter-ios-smoke
          IOS_SMOKE_ALLOW_INFRASTRUCTURE_FAILURE: "1"
        run: npm run smoke:ios-simulator

      - name: Upload iOS simulator smoke artifacts
        if: always() && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/swipebetter-ios-smoke
          if-no-files-found: warn
          retention-days: 14
